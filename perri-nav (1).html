<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perri Nav</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; background: #1A1208; overflow-x: hidden; }
  :root {
    --gold: #C9912A; --gold-light: #F0C060; --gold-dark: #7A5510;
    --stone: #2A2018; --stone-light: #5C4A32;
    --cream: #F2E8D0; --cream-dim: #B8A98A;
    --pom-light: #C4314B;
  }
  .nav-wrap {
    width: 100%;
    background: linear-gradient(180deg, #1A1208 0%, #2A1E0E 100%);
    border-top: 3px solid var(--gold-dark);
    border-bottom: 3px solid var(--gold-dark);
    padding: 12px 10px;
    position: relative;
  }
  .nav-wrap::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
  }
  .nav-label { font-family: 'Press Start 2P', monospace; font-size: 5px; color: var(--cream-dim); text-align: center; letter-spacing: 0.2em; margin-bottom: 10px; position: relative; z-index: 1; }
  .nav-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; position: relative; z-index: 1; }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 8px 4px 7px; background: var(--stone);
    border-top: 2px solid var(--stone-light); border-left: 2px solid var(--stone-light);
    border-right: 2px solid #0D0A06; border-bottom: 2px solid #0D0A06;
    cursor: pointer; text-decoration: none; transition: filter 0.1s;
  }
  .nav-btn:hover { filter: brightness(1.3); border-top-color: var(--gold); border-left-color: var(--gold); }
  .nav-btn:active { border-top-color: #0D0A06; border-left-color: #0D0A06; border-right-color: var(--stone-light); border-bottom-color: var(--stone-light); }
  .nav-icon { font-size: 16px; line-height: 1; display: block; }
  .nav-text { font-family: 'Press Start 2P', monospace; font-size: 4px; color: var(--cream-dim); text-align: center; letter-spacing: 0.05em; line-height: 1.4; }
  .nav-btn.music { border-top-color: #7B3FA0; border-left-color: #7B3FA0; }
  .nav-btn.story { border-top-color: #3A7ABF; border-left-color: #3A7ABF; }
  .nav-btn.agency { border-top-color: #C9912A; border-left-color: #C9912A; }
  .nav-btn.body { border-top-color: #3A7A4A; border-left-color: #3A7A4A; }
  .nav-btn.land { border-top-color: #C4314B; border-left-color: #C4314B; }
  .nav-btn.above { border-top-color: #888780; border-left-color: #888780; }
  .nav-btn.hearth { border-top-color: #BF5A2A; border-left-color: #BF5A2A; }
  .nav-btn.village { border-top-color: #7A6A3A; border-left-color: #7A6A3A; }
  .nav-btn.sacred { border-top-color: #4A3A7A; border-left-color: #4A3A7A; }
  .nav-btn.treasury { border-top-color: #C9912A; border-left-color: #C9912A; }
</style>
</head>
<body>
<div class="nav-wrap">
  <div class="nav-label">✦ ENTER YOUR REALM ✦</div>
  <div class="nav-grid">
    <a class="nav-btn music" href="https://www.notion.so/331c5f1ca4bb81479d5dd667c79733b2" target="_blank">
      <span class="nav-icon">🎸</span><span class="nav-text">THE MUSIC</span>
    </a>
    <a class="nav-btn story" href="https://www.notion.so/331c5f1ca4bb8151ba1fecdbcf4ccb1e" target="_blank">
      <span class="nav-icon">📖</span><span class="nav-text">THE STORY</span>
    </a>
    <a class="nav-btn agency" href="https://www.notion.so/331c5f1ca4bb81c09fbcee85c5e1bddf" target="_blank">
      <span class="nav-icon">⚡</span><span class="nav-text">THE AGENCY</span>
    </a>
    <a class="nav-btn body" href="https://www.notion.so/331c5f1ca4bb81c3be68c1efc143af11" target="_blank">
      <span class="nav-icon">🌿</span><span class="nav-text">THE BODY</span>
    </a>
    <a class="nav-btn land" href="https://www.notion.so/331c5f1ca4bb81b799fbda79394fd88e" target="_blank">
      <span class="nav-icon">🌺</span><span class="nav-text">THE LAND</span>
    </a>
    <a class="nav-btn above" href="https://www.notion.so/331c5f1ca4bb81519f21f84344a43332" target="_blank">
      <span class="nav-icon">💼</span><span class="nav-text">ABOVE WORLD</span>
    </a>
    <a class="nav-btn hearth" href="https://www.notion.so/331c5f1ca4bb81198fa1e9c1bbab03fe" target="_blank">
      <span class="nav-icon">🔥</span><span class="nav-text">THE HEARTH</span>
    </a>
    <a class="nav-btn village" href="https://www.notion.so/331c5f1ca4bb811abde7f62481bac6e0" target="_blank">
      <span class="nav-icon">🌍</span><span class="nav-text">THE VILLAGE</span>
    </a>
    <a class="nav-btn sacred" href="https://www.notion.so/331c5f1ca4bb81398e2bd03d009365c4" target="_blank">
      <span class="nav-icon">🐴</span><span class="nav-text">THE SACRED</span>
    </a>
    <a class="nav-btn treasury" href="https://www.notion.so/331c5f1ca4bb81f1bcb6dedc131c6013" target="_blank">
      <span class="nav-icon">💰</span><span class="nav-text">THE TREASURY</span>
    </a>
  </div>
</div>
</body>
</html>
